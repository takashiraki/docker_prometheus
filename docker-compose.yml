services:
  prometheus:
    image: prom/prometheus:latest
    container_name: my_prometheus
    environment:
      - VIRTUAL_HOST=prometheus.localhost
      - VIRTUAL_PORT=9090
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - my_proxy_network

networks:
  my_proxy_network:
    external: true
