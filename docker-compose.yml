services:
  prometheus:
    image: prom/prometheus:latest
    container_name: my_prometheus
    environment:
      - VIRTUAL_HOST=prometheus.localhost
      - VIRTUAL_PORT=9090
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - my_proxy_network

  node_exporter:
    image: prom/node-exporter:latest
    container_name: my_node_exporter
    environment:
      - VIRTUAL_HOST=node-exporter.localhost
      - VIRTUAL_PORT=9100
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - my_proxy_network

  node_exporter_1:
    image: prom/node-exporter:latest
    container_name: my_node_exporter_1
    environment:
      - VIRTUAL_HOST=node-exporter-1.localhost
      - VIRTUAL_PORT=9100
    ports:
      - "9101:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - my_proxy_network

networks:
  my_proxy_network:
    external: true
